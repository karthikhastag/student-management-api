name: StudentManagement API CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  build-test-publish:
    name: Build, Test, and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore WebApplication1/WebApplication1.csproj

      - name: Build solution
        run: dotnet build WebApplication1/WebApplication1.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test webApplication1test/TestProject1.csproj --configuration Release --no-build --verbosity normal

      - name: Publish Web API
        run: dotnet publish WebApplication1/WebApplication1.csproj --configuration Release --output ./publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: studentmanagement-api-publish
          path: ./publish
